$hypr = ~/.config/hypr
$cConf = ~/.config/caelestia

# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

# Default monitor conf
monitor = , preferred, auto, 1

# Configs
source = env.conf
source = general.conf
source = input.conf
source = misc.conf
source = animations.conf
source = decoration.conf
source = group.conf
source = execs.conf
source = rules.conf
source = gestures.conf
source = keybindings.conf
source = plugins.conf
