exec = hyprctl dispatch submap global
submap = global

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Caelestia Stuffs
# ---------------------------------------------------------- 

# Launcher
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Apps
bind = $mainMod, RETURN, exec, app2unit -- $terminal
bind = $mainMod, E, exec, app2unit -- $fileExplorer
bind = $mainMod SHIFT, B, exec, app2unit -- $browser
bind = $mainMod, SPACE, exec, rofi -show drun || pkill rofi

# Brightness
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Media
bindl = Ctrl+Super, Space, global, caelestia:mediaToggle
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = Ctrl+Super, Equal, global, caelestia:mediaNext
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = Ctrl+Super, Minus, global, caelestia:mediaPrev
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# Restore lock
bindl = Super+Alt+Ctrl, L, exec, caelestia shell -d
bindl = Super+Alt+Ctrl, L, global, caelestia:lock

# Misc
bind = Ctrl+Alt, Delete, global, caelestia:session
bindl = Ctrl+Alt, C, global, caelestia:clearNotifs
bind = Super, Q, global, caelestia:showall

# Volume
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindl = Super+Shift, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ $volumeStep%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ $volumeStep%-

# Sleep
# bind = Super+Shift, L, exec, systemctl suspend-then-hibernate

# Clipboard and emoji picker
bind = Super, V, exec, pkill fuzzel || caelestia clipboard
bind = Super+Alt, V, exec, pkill fuzzel || caelestia clipboard -d
bind = Super, Period, exec, pkill fuzzel || caelestia emoji -p
bindl = Ctrl+Shift+Alt, V, exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"  # Alternate paste
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod+Ctrl, J, togglesplit, # dwindle
bind = $mainMod, T, togglefloating,

# Utilities
bindl = , Print, exec, caelestia screenshot  # Full screen capture > clipboard
bindl = Super, F, exec, caelestia screenshot  # Full screen capture > clipboard
bind = Super+Shift, F, global, caelestia:screenshotFreeze  # Capture region (freeze)
bind = Super+Shift+Alt, F, global, caelestia:screenshot  # Capture region
bind = Super+Alt, R, exec, caelestia record -s  # Record screen with sound
bind = Ctrl+Alt, R, exec, caelestia record  # Record screen
bind = Super+Shift+Alt, R, exec, caelestia record -r  # Record region
bind = Super+Shift, C, exec, hyprpicker -a  # Colour picker

# Scripts
# bind = $mainMod SHIFT, SPACE, exec, ~/.config/waybar/scripts/reloadwb.sh
# bind = CTRL, SPACE, exec, ~/.config/rofi/scripts/wallpaper.sh 
# bind = $mainMod SHIFT, E, exec, ~/.config/rofi/scripts/emoji-picker.sh 
# bind = $mainMod SHIFT, I, exec, ~/.config/rofi/scripts/icon-picker.sh 
# bind = $mainMod SHIFT, W, exec, ~/.config/rofi/scripts/wbswitcher.sh 
# bind = $mainMod ALT, SPACE, exec, ~/.config/rofi/scripts/menu.sh 


# Windows Management
# ---------------------------------------------------------- 

# Window focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move Window
bind = $mainMod+SHIFT, h, movewindow, l
bind = $mainMod+SHIFT, l, movewindow, r
bind = $mainMod+SHIFT, k, movewindow, u
bind = $mainMod+SHIFT, j, movewindow, d 

# Resize Window
bind = $mainMod Alt, h, resizeactive, -40 0
bind = $mainMod Alt, l, resizeactive, 40 0
bind = $mainMod Alt, k, resizeactive, 0 -40
bind = $mainMod Alt, j, resizeactive, 0 40

# Move Floating Window
binde = $mainMod CTRL, h, moveactive, -40 0
binde = $mainMod CTRL, l, moveactive, 40 0
binde = $mainMod CTRL, k, moveactive, 0 -40
binde = $mainMod CTRL, j, moveactive, 0 40

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Special workspace toggles
bind = Ctrl+Shift, Escape, exec, caelestia toggle sysmon
bind = Super+Shift, M, exec, caelestia toggle music
bind = Super, D, exec, caelestia toggle communication
bind = Super, R, exec, caelestia toggle game

# Go to workspace +1/-1
bind = Super, Tab, workspace, e+1
bind = Super+Shift, Tab, workspace, e-1

# Killing stuffs
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, W, killactive,

# bind = SUPER, G, hyprexpo:expo, toggle
